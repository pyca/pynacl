name: CI
on:
  pull_request: {}
  push:
    branches:
      - main
      - '*.x'
    tags:
      - "*"

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        PYTHON:
          - {VERSION: "3.13", NOXSESSION: "docs"}
          - {VERSION: "3.13", NOXSESSION: "meta"}
          - {VERSION: "3.13", NOXSESSION: "mypy"}
          - {VERSION: "pypy-3.10", NOXSESSION: "tests"}
          - {VERSION: "pypy-3.11", NOXSESSION: "tests"}
          - {VERSION: "3.8", NOXSESSION: "tests"}
          - {VERSION: "3.9", NOXSESSION: "tests"}
          - {VERSION: "3.10", NOXSESSION: "tests"}
          - {VERSION: "3.11", NOXSESSION: "tests"}
          - {VERSION: "3.12", NOXSESSION: "tests"}
          - {VERSION: "3.13", NOXSESSION: "tests"}
          - {VERSION: "3.14", NOXSESSION: "tests"}
          - {VERSION: "3.14t", NOXSESSION: "tests"}
          - {VERSION: "3.14", NOXSESSION: "tests", NOTE: "system", SODIUM_INSTALL: "system"}
          - {VERSION: "3.14", NOXSESSION: "tests", NOTE: "minimal", SODIUM_INSTALL_MINIMAL: "1"}
    name: "Linux ${{ matrix.PYTHON.VERSION }} ${{ matrix.PYTHON.NOXSESSION }} ${{ matrix.PYTHON.NOTE }}"
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
      - name: Install nox
        run: pip install nox
      - name: Install libsodium (system install only)
        run: |
          wget --timeout=60 https://download.libsodium.org/libsodium/releases/LATEST.tar.gz || \
          wget --timeout=60 https://download.libsodium.org/libsodium/releases/LATEST.tar.gz
          tar zxvf LATEST.tar.gz
          cd libsodium-*
          ./configure ${SODIUM_INSTALL_MINIMAL:+--enable-minimal}
          make
          make check
          sudo make install
          sudo ldconfig
        env:
          SODIUM_INSTALL_MINIMAL: ${{ matrix.PYTHON.SODIUM_INSTALL_MINIMAL }}
        if: matrix.PYTHON.SODIUM_INSTALL == 'system'
      - name: Run tests
        run: LIBSODIUM_MAKE_ARGS="-j$(nproc)" nox -s ${{ matrix.python.NOXSESSION }}
        env:
          SODIUM_INSTALL_MINIMAL: ${{ matrix.PYTHON.SODIUM_INSTALL_MINIMAL }}
          SODIUM_INSTALL: ${{ matrix.PYTHON.SODIUM_INSTALL }}
      - uses: ./.github/actions/upload-coverage

  macos:
    runs-on: ${{ matrix.RUNNER }}
    strategy:
      matrix:
        RUNNER:
          - 'macos-15-intel'
          - 'macos-latest'
        PYTHON:
          - {VERSION: "3.8", NOXSESSION: "tests"}
          - {VERSION: "3.14", NOXSESSION: "tests"}
          - {VERSION: "3.14t", NOXSESSION: "tests"}
          - {VERSION: "3.14", NOXSESSION: "tests", NOTE: " (minimal build)", SODIUM_INSTALL_MINIMAL: "1"}
        exclude:
          - PYTHON: {VERSION: "3.8", NOXSESSION: "tests"}
            RUNNER: macos-latest
    name: "${{ matrix.RUNNER }} ${{ matrix.PYTHON.VERSION }} ${{ matrix.python.NOXSESSION }} ${{ matrix.PYTHON.NOTE }}"
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
      - name: Install nox
        run: pip install nox
      - name: Run tests
        run: LIBSODIUM_MAKE_ARGS="-j$(sysctl -n hw.ncpu)" nox -s ${{ matrix.python.NOXSESSION }}
        env:
          SODIUM_INSTALL_MINIMAL: ${{ matrix.PYTHON.SODIUM_INSTALL_MINIMAL }}
      - uses: ./.github/actions/upload-coverage
  windows:
    runs-on: ${{ matrix.WINDOWS.IMAGE }}
    strategy:
      matrix:
        WINDOWS:
          - {ARCH: 'x86', SODIUM_ARCH: 'Win32', IMAGE: "windows-latest"}
          - {ARCH: 'x64', SODIUM_ARCH: 'x64', IMAGE: "windows-latest"}
        PYTHON:
          - {VERSION: "3.8", NOXSESSION: "tests", SODIUM_MSVC_VERSION: "v143"}
          - {VERSION: "3.14", NOXSESSION: "tests", SODIUM_MSVC_VERSION: "v143"}
          - {VERSION: "3.14t", NOXSESSION: "tests", SODIUM_MSVC_VERSION: "v143"}

    name: "Windows ${{ matrix.WINDOWS.ARCH }} ${{ matrix.PYTHON.VERSION }} ${{ matrix.PYTHON.NOXSESSION }}"
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
          architecture: ${{ matrix.WINDOWS.ARCH }}
      - name: 'Extract libsodium libraries'
        run: |
          Expand-Archive src/libsodium-1.0.20-stable-msvc.zip -DestinationPath c:\
        shell: powershell
      - name: Install nox
        run: pip install nox
      - name: Run tests
        run: |
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -no_logo -arch=${{ matrix.WINDOWS.ARCH }}
            set PYNACL_SODIUM_LIBRARY_NAME=sodium
            set PYNACL_SODIUM_STATIC=1
            set SODIUM_INSTALL=system
            set INCLUDE=C:/libsodium/include;%INCLUDE%
            set LIB=C:/libsodium/${{ matrix.WINDOWS.SODIUM_ARCH }}/release/${{ matrix.PYTHON.SODIUM_MSVC_VERSION }}/static;%LIB%
            nox -s ${{ matrix.PYTHON.NOXSESSION }}
            IF %ERRORLEVEL% NEQ 0 EXIT /B %ERRORLEVEL%
        shell: cmd
      - uses: ./.github/actions/upload-coverage

  pyemscripten:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in lockstep with wheel-builder.yml::pyemscripten.
        PYODIDE:
          # TODO: switch to stable Pyodide 314.0 when released.
          - VERSION: "314.0.0a2"
            EMSDK: "5.0.3"
            PYTHON: "3.14"
            # PEP 783 platform tag emitted by pyodide-build for this xbuildenv.
            WHEEL_TAG: "cp314-pyemscripten_2026_0_wasm32"
    name: "${{ matrix.PYODIDE.WHEEL_TAG }} (Pyodide ${{ matrix.PYODIDE.VERSION }})"
    env:
      PYODIDE_VERSION: ${{ matrix.PYODIDE.VERSION }}
      EMSDK_VERSION: ${{ matrix.PYODIDE.EMSDK }}
      WHEEL_TAG: ${{ matrix.PYODIDE.WHEEL_TAG }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYODIDE.PYTHON }}

      - name: Install pyodide-build (from main)
        # TODO: No released pyodide-build yet supports Python 3.14 / pyemscripten_2026_0. Fix this when pyodide-build has a stable release with support.
        run: python -m pip install "pyodide-build[resolve] @ git+https://github.com/pyodide/pyodide-build.git@main"

      - name: Install Pyodide xbuildenv (cross-build artifacts + patches)
        run: pyodide xbuildenv install

      - name: Install Pyodide-pinned Emscripten SDK
        # Pyodide patches emscripten; vanilla emsdk produces broken wheels.
        run: pyodide xbuildenv install-emscripten

      - name: Cache cross-compiled libsodium
        id: sodium-cache
        uses: actions/cache@v5
        with:
          path: /tmp/libsodium-pyodide
          # min0/min1 partitions full vs --enable-minimal builds.
          key: libsodium-pyodide-${{ env.PYODIDE_VERSION }}-${{ env.EMSDK_VERSION }}-min${{ matrix.PYODIDE.SODIUM_INSTALL_MINIMAL || '0' }}-${{ hashFiles('.github/bin/build_pyemscripten_libsodium.sh', 'src/libsodium/configure.ac') }}-${{ runner.os }}-${{ runner.arch }}-0

      - name: Cross-compile libsodium for wasm32-emscripten
        if: steps.sodium-cache.outputs.cache-hit != 'true'
        env:
          SODIUM_SRC: ${{ github.workspace }}/src/libsodium
          SODIUM_PATH: /tmp/libsodium-pyodide
          SODIUM_INSTALL_MINIMAL: ${{ matrix.PYODIDE.SODIUM_INSTALL_MINIMAL }}
        run: |
          set -e
          # shellcheck disable=SC1091
          source "$(pyodide config get emsdk_dir)/emsdk_env.sh"
          bash .github/bin/build_pyemscripten_libsodium.sh

      - name: Build pyemscripten wheel
        env:
          SODIUM_INSTALL: system
        run: |
          set -e
          # shellcheck disable=SC1091
          source "$(pyodide config get emsdk_dir)/emsdk_env.sh"
          export CFLAGS="-I/tmp/libsodium-pyodide/include ${CFLAGS:-}"
          export LDFLAGS="-L/tmp/libsodium-pyodide/lib ${LDFLAGS:-}"
          mkdir -p wheelhouse
          pyodide build .
          # Match WHEEL_TAG exactly: catches silent xbuildenv ABI drift.
          cp "dist/pynacl-${WHEEL_TAG}.whl" wheelhouse/ 2>/dev/null \
            || cp dist/pynacl-*-${WHEEL_TAG}.whl wheelhouse/

      - name: Run tests
        run: |
          set -e
          pyodide venv .venv-pyodide
          # shellcheck disable=SC1091
          source .venv-pyodide/bin/activate
          # pytest-xdist omitted: no multiprocessing under Emscripten.
          pip install pytest pytest-cov hypothesis
          pip install wheelhouse/pynacl-*.whl
          python -c "import nacl.signing; key = nacl.signing.SigningKey.generate(); signature = key.sign(b'test'); key.verify_key.verify(signature)"
          pytest -p no:cacheprovider --cov=nacl --cov=tests tests/
      - uses: ./.github/actions/upload-coverage

  all-green:
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, pyemscripten]
    if: ${{ always() }}
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6.0.2
        timeout-minutes: 3
        with:
          persist-credentials: false
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
      - name: Setup python
        if: ${{ always() }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
        timeout-minutes: 3
      - run: pip install coverage[toml]
        if: ${{ always() }}
      - name: Download coverage data
        if: ${{ always() }}
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: Combine coverage and fail if it's <100%.
        if: ${{ always() }}
        id: combinecoverage
        run: |
          set +e
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          coverage combine
          coverage report -m --fail-under 100
          COV_EXIT_CODE=$?
          if [ $COV_EXIT_CODE -ne 0 ]; then
            echo "🚨 Coverage failed. Under 100%" | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report -m >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $COV_EXIT_CODE
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-report
          path: htmlcov
          if-no-files-found: ignore
        if: ${{ failure() && steps.combinecoverage.outcome == 'failure' }}
